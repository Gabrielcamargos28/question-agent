# SonarQube Project Configuration
# This file configures the SonarQube Scanner for the Pluri Question Ingestion Agent.

# Unique project key and name within SonarQube
sonar.projectKey=pluri-question-agent
sonar.projectName=Pluri Question Ingestion Agent
sonar.projectVersion=1.0.0

# Path to the source directories (comma-separated, relative to this file)
sonar.sources=app

# Path to the test directories (comma-separated, relative to this file)
sonar.tests=tests

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Python version configuration
sonar.python.version=3.11

# Exclusions to prevent analyzing virtual environments, system generated files, and data folder
sonar.exclusions=venv/**, **/__pycache__/**, .pytest_cache/**, .idea/**, .benchmarks/**, data/**, logs/**, *.pdf, *.zip, *.aux, *.bbl, *.blg, *.log, *.out, *.jpg, *.md

# Test execution and coverage reports configuration (for pytest and pytest-cov)
sonar.python.xunit.reportPath=report.xml
sonar.python.coverage.reportPaths=coverage.xml
